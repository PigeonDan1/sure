name: whisper_large_v3_turbo
task: ASR
description: "Phase-1 wrapper for openai/whisper-large-v3-turbo via the repo-native Whisper entrypoint."

model:
  id: turbo
  backend: pip
  device: cpu

server:
  command: ["python", "server.py"]
  env:
    MODEL_ID: turbo
    DEVICE: cpu

tools:
  - name: transcribe_audio
    description: Run ASR on a local audio path.
    input_schema:
      type: object
      properties:
        audio_path:
          type: string
      required: [audio_path]
