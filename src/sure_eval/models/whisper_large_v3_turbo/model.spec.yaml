model_id: "openai/whisper-large-v3-turbo"
model_name: "whisper-large-v3-turbo"
task_type: "asr"
deployment_type: "local"

repo:
  url: "https://github.com/openai/whisper"
  commit: null

weights:
  source: "huggingface"
  local_path: null
  required: true

environment:
  preferred_backend: "uv"
  python_version: "3.10"
  requires_gpu: false
  system_packages:
    - "ffmpeg"

phase1_runtime_target:
  description: "Validate only the minimal multilingual ASR callable path via Transformers AutoModel/AutoProcessor/pipeline."
  excludes:
    - "translation_mode"
    - "diarization_integration"
    - "downstream_alignment"

entrypoints:
  import_test: "from transformers import AutoModelForSpeechSeq2Seq, AutoProcessor, pipeline"
  load_test: |
    from transformers import AutoModelForSpeechSeq2Seq, AutoProcessor, pipeline
    model_id = "openai/whisper-large-v3-turbo"
    processor = AutoProcessor.from_pretrained(model_id)
    model = AutoModelForSpeechSeq2Seq.from_pretrained(model_id)
    pipe = pipeline(
        "automatic-speech-recognition",
        model=model,
        tokenizer=processor.tokenizer,
        feature_extractor=processor.feature_extractor,
    )
  infer_test: |
    result = pipe("tests/fixtures/shared/asr/en_16k_10s.wav")

fixture:
  requested_audio: "tests/fixtures/shared/asr/multilingual_16k_10s.wav"
  selected_audio: "tests/fixtures/shared/asr/en_16k_10s.wav"
  transcript: null
  language: "auto"
  task_specific: true
  source: "shared_fallback"
  note: "Requested multilingual shared fixture is absent in-repo; phase 1 uses the existing shared ASR fallback and records the mismatch explicitly."

io_contract:
  input_type: "audio_path"
  output_type: "json"
  primary_field: "text"
  required_fields:
    - "text"
  nonempty_fields:
    - "text"
  json_serializable: true

contract_expectation:
  required_outcomes:
    - "contain non-empty text"
    - "be JSON serializable"
  optional_fields:
    - "segments"
    - "language"

acceptance:
  must_import: true
  must_load: true
  must_infer: true
  must_pass_contract: true
  must_return_nonempty: true
