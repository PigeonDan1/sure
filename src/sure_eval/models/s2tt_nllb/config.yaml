name: s2tt_nllb
task: S2TT
description: "Phase-1 cascaded S2TT baseline using Whisper ASR plus NLLB MT"
version: "1.0.0"

model:
  id: "facebook/nllb-200-distilled-600M"
  size: "600M"
  languages: ["multilingual"]
  license: "CC-BY-NC"

server:
  command: [".venv/bin/python", "server.py"]
  working_dir: "."
  env:
    ASR_MODEL_ID: "openai/whisper-tiny"
    MT_MODEL_ID: "facebook/nllb-200-distilled-600M"
    DEVICE: "cpu"
  timeout: 300

tools:
  - name: "s2tt_translate"
    description: "Translate speech to text"
    input_schema:
      type: object
      properties:
        audio_path:
          type: string
        source_lang:
          type: string
        target_lang:
          type: string
      required: ["audio_path", "source_lang", "target_lang"]

results: {}
