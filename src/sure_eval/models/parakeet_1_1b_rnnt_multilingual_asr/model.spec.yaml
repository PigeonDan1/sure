model_id: "nvidia/parakeet-1.1b-rnnt-multilingual-asr"
model_name: "parakeet-1.1b-rnnt-multilingual-asr"
task_type: "asr"
deployment_type: "local"

repo:
  url: "https://github.com/NVIDIA/NeMo"
  commit: null

weights:
  source: "huggingface_or_nemo"
  local_path: null
  required: true

environment:
  preferred_backend: "docker"
  python_version: "3.10"
  requires_gpu: true
  system_packages:
    - "ffmpeg"

phase1_runtime_target:
  description: "Validate only the minimal multilingual ASR path by importing the NeMo ASR stack, loading the exact multilingual Parakeet checkpoint, running one multilingual speech inference, and obtaining a non-empty transcript."
  excludes:
    - "benchmarking"
    - "streaming_evaluation"
    - "language_specific_tuning"

entrypoints:
  import_test: "import nemo"
  load_test: |
    import nemo.collections.asr as nemo_asr
    model = nemo_asr.models.EncDecRNNTBPEModel.from_pretrained(
        model_name="nvidia/parakeet-1.1b-rnnt-multilingual-asr",
    )
  infer_test: |
    result = model.transcribe(["tests/fixtures/shared/asr/multilingual_16k_10s.wav"])

fixture:
  requested_audio: "tests/fixtures/shared/asr/multilingual_16k_10s.wav"
  selected_audio: null
  transcript: "tests/fixtures/shared/asr/multilingual_16k_10s.txt"
  language: "auto"
  task_specific: true
  source: "requested"
  note: "The requested multilingual shared fixture is not present in-repo, so phase 1 cannot lawfully downgrade to the English-only shared fallback without weakening the multilingual target."

io_contract:
  input_type: "audio_path"
  output_type: "json"
  primary_field: "text"
  required_fields:
    - "text"
  nonempty_fields:
    - "text"
  json_serializable: true

contract_expectation:
  required_outcomes:
    - "contain non-empty text"
    - "be serializable"
  optional_fields:
    - "language"

acceptance:
  must_import: true
  must_load: true
  must_infer: true
  must_pass_contract: true
  must_return_nonempty: true
