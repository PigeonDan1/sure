model_id: "FireRedTeam/FireRedVAD"
model_name: "fireredvad"
task_type: "vad"
deployment_type: "local"

repo:
  url: "https://github.com/FireRedTeam/FireRedVAD.git"
  commit: null
  package_import_root: "fireredvad"
  standalone_module: "fireredvad"

weights:
  source: "huggingface"
  repo_id: "FireRedTeam/FireRedVAD"
  local_path: "pretrained_models/FireRedVAD"
  required: true
  cache_policy: "model_local_first"
  local_dir_name: "checkpoints"
  runtime_path: "pretrained_models/FireRedVAD/VAD"

environment:
  preferred_backend: "pixi"
  python_version: "3.10"
  requires_gpu: false
  system_packages:
    - ffmpeg
    - libsndfile1
  notes:
    - "Upstream quick start uses a conda-style Python 3.10 environment."
    - "Treat pixi/conda family as the preferred backend family for faithful reproduction."
    - "If pixi cannot faithfully reproduce the upstream environment, conda is allowed but the deviation must be explicitly justified and recorded."
    - "Default to CPU for phase-1 minimal validation; GPU is optional and not required for READY_LOCAL."

entrypoints:
  import_test: "from fireredvad import FireRedVad, FireRedVadConfig"
  load_test: |
    from fireredvad import FireRedVad, FireRedVadConfig

    cfg = FireRedVadConfig(
        use_gpu=False,
        smooth_window_size=5,
        speech_threshold=0.4,
        min_speech_frame=20,
        max_speech_frame=2000,
        min_silence_frame=20,
        merge_silence_frame=0,
        extend_speech_frame=0,
        chunk_max_frame=30000,
    )
    model = FireRedVad.from_pretrained("pretrained_models/FireRedVAD/VAD", cfg)
  infer_test: |
    result, probs = model.detect("tests/fixtures/shared/vad/en_16k.wav")

fixture:
  audio: "tests/fixtures/shared/vad/en_16k.wav"
  language: "not_applicable"
  task_specific: true
  fallback_allowed: true
  fallback_policy:
    - "first fallback: reuse tests/fixtures/shared/asr/en_16k.wav only after explicit verification that it is 16kHz 16-bit mono PCM wav"
    - "second fallback: create a model-local converted wav fixture with ffmpeg and record preprocessing evidence plus checksum"
    - "do not use arbitrary downloaded audio during validation without recording provenance and normalization steps"
  selected_audio: "tests/fixtures/shared/vad/en_16k_10s.wav"
  selected_source: "shared"
  selected_reason: "The requested VAD fixture en_16k.wav is absent in-repo. The existing shared VAD fixture en_16k_10s.wav preserves the same VAD task semantics and is already a 16kHz 16-bit mono PCM WAV asset."
  note: "No ffmpeg conversion is required for phase-1 because the selected fallback fixture is already format-compliant and includes speech plus non-speech regions."

io_contract:
  input_type: "audio_path"
  output_type: "json"
  primary_field: "timestamps"
  required_fields: ["dur", "timestamps", "wav_path"]
  nonempty_fields: ["timestamps"]
  json_serializable: true
  contract_notes:
    - "Repo-native non-streaming VAD result is expected to contain dur, timestamps, and wav_path."
    - "timestamps must represent detected speech regions."
    - "probs are auxiliary and may be recorded as optional output, but they are not required for primary contract success."
    - "wrapper adaptation may normalize tuples into JSON-safe lists, but repo-native raw output must be preserved in artifacts before wrapper-level normalization."

acceptance:
  must_import: true
  must_load: true
  must_infer: true
  must_return_nonempty: true
